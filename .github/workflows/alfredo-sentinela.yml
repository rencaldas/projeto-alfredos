name: Alfredo Sentinela

on:
  schedule:
    # 09:00 UTC equivale a 06:00 em America/Sao_Paulo.
    - cron: '0 9 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: alfredo-sentinela
  cancel-in-progress: true

jobs:
  auditar-repositorios:
    name: Auditar dependencias dos repositorios
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Validar configuracao
        run: |
          if [ -z "${ALFREDO_SENTINELA_GITHUB_TOKEN}" ]; then
            echo "::error::Configure ALFREDO_SENTINELA_GITHUB_TOKEN com permissao de leitura nos repositorios que serao auditados."
            exit 1
          fi

          if [ -z "${ALFREDO_SENTINELA_BOT_TOKEN:-${TELEGRAM_SENTINELA_BOT_TOKEN:-$TELEGRAM_BOT_TOKEN}}" ]; then
            echo "::error::Configure ALFREDO_SENTINELA_BOT_TOKEN em Settings > Secrets and variables > Actions."
            exit 1
          fi

          if [ -z "${ALFREDO_SENTINELA_BOT_CHAT_ID:-${TELEGRAM_SENTINELA_CHAT_ID:-$TELEGRAM_CHAT_ID}}" ]; then
            echo "::error::Configure ALFREDO_SENTINELA_BOT_CHAT_ID em Settings > Secrets and variables > Actions."
            exit 1
          fi
        env:
          ALFREDO_SENTINELA_GITHUB_TOKEN: ${{ secrets.ALFREDO_SENTINELA_GITHUB_TOKEN }}
          ALFREDO_SENTINELA_BOT_TOKEN: ${{ secrets.ALFREDO_SENTINELA_BOT_TOKEN }}
          ALFREDO_SENTINELA_BOT_CHAT_ID: ${{ secrets.ALFREDO_SENTINELA_BOT_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_SENTINELA_BOT_TOKEN: ${{ secrets.TELEGRAM_SENTINELA_BOT_TOKEN }}
          TELEGRAM_SENTINELA_CHAT_ID: ${{ secrets.TELEGRAM_SENTINELA_CHAT_ID }}

      - name: Executar Alfredo Sentinela
        run: npm run alfredo:sentinela
        env:
          ALFREDO_SENTINELA_GITHUB_TOKEN: ${{ secrets.ALFREDO_SENTINELA_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          ALFREDO_SENTINELA_BOT_TOKEN: ${{ secrets.ALFREDO_SENTINELA_BOT_TOKEN }}
          ALFREDO_SENTINELA_BOT_CHAT_ID: ${{ secrets.ALFREDO_SENTINELA_BOT_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_SENTINELA_BOT_TOKEN: ${{ secrets.TELEGRAM_SENTINELA_BOT_TOKEN }}
          TELEGRAM_SENTINELA_CHAT_ID: ${{ secrets.TELEGRAM_SENTINELA_CHAT_ID }}
          SENTINELA_TARGETS: ${{ vars.SENTINELA_TARGETS }}
          SENTINELA_MAX_REPOS: ${{ vars.SENTINELA_MAX_REPOS }}
          SENTINELA_MAX_ALERTS: ${{ vars.SENTINELA_MAX_ALERTS }}
          SENTINELA_MAX_DEPENDENCIES_PER_REPO: ${{ vars.SENTINELA_MAX_DEPENDENCIES_PER_REPO }}
          SENTINELA_INCLUDE_ARCHIVED: ${{ vars.SENTINELA_INCLUDE_ARCHIVED }}
          SENTINELA_UPDATE_MAJOR_GAP: ${{ vars.SENTINELA_UPDATE_MAJOR_GAP }}

      - name: Versionar historico
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/state/sentinela-history.json .github/state/daily-log.json

          if git diff --cached --quiet; then
            echo "Historico sem alteracoes."
            exit 0
          fi

          git commit -m "Atualiza historico do Alfredo Sentinela"
          git pull --rebase origin "$GITHUB_REF_NAME"
          git push origin HEAD:"$GITHUB_REF_NAME"
