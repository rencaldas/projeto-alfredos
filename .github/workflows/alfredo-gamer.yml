name: Alfredo Gamer

on:
  schedule:
    # 02:00 UTC equivale a 23:00 em America/Sao_Paulo.
    - cron: '0 2 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: alfredo-gamer
  cancel-in-progress: true

jobs:
  enviar-jogos-gratis:
    name: Enviar jogos gratis ao Telegram
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Validar configuracao
        run: |
          if [ -z "${ALFREDO_GAMER_BOT_TOKEN:-${TELEGRAM_GAMER_BOT_TOKEN:-$TELEGRAM_BOT_TOKEN}}" ]; then
            echo "::error::Configure ALFREDO_GAMER_BOT_TOKEN em Settings > Secrets and variables > Actions."
            exit 1
          fi

          if [ -z "${ALFREDO_GAMER_BOT_CHAT_ID:-${TELEGRAM_GAMER_CHAT_ID:-$TELEGRAM_CHAT_ID}}" ]; then
            echo "::error::Configure ALFREDO_GAMER_BOT_CHAT_ID em Settings > Secrets and variables > Actions."
            exit 1
          fi
        env:
          ALFREDO_GAMER_BOT_TOKEN: ${{ secrets.ALFREDO_GAMER_BOT_TOKEN }}
          ALFREDO_GAMER_BOT_CHAT_ID: ${{ secrets.ALFREDO_GAMER_BOT_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_GAMER_BOT_TOKEN: ${{ secrets.TELEGRAM_GAMER_BOT_TOKEN }}
          TELEGRAM_GAMER_CHAT_ID: ${{ secrets.TELEGRAM_GAMER_CHAT_ID }}

      - name: Executar Alfredo Gamer
        run: npm run alfredo:gamer
        env:
          ALFREDO_GAMER_BOT_TOKEN: ${{ secrets.ALFREDO_GAMER_BOT_TOKEN }}
          ALFREDO_GAMER_BOT_CHAT_ID: ${{ secrets.ALFREDO_GAMER_BOT_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_GAMER_BOT_TOKEN: ${{ secrets.TELEGRAM_GAMER_BOT_TOKEN }}
          TELEGRAM_GAMER_CHAT_ID: ${{ secrets.TELEGRAM_GAMER_CHAT_ID }}
          GAMERPOWER_URL: ${{ vars.GAMERPOWER_URL }}
          GAMES_MAX_ITEMS: ${{ vars.GAMES_MAX_ITEMS }}

      - name: Versionar historico
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/state/games-history.json .github/state/daily-log.json

          if git diff --cached --quiet; then
            echo "Historico sem alteracoes."
            exit 0
          fi

          git commit -m "Atualiza historico do Alfredo Gamer"
          git pull --rebase origin "$GITHUB_REF_NAME"
          git push origin HEAD:"$GITHUB_REF_NAME"
