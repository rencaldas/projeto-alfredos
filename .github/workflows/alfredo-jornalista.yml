name: Alfredo Jornalista

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: alfredo-jornalista
  cancel-in-progress: true

jobs:
  enviar-noticias:
    name: Enviar noticias ao Telegram
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Validar configuracao
        run: |
          if [ -z "${ALFREDO_NEWS_BOT_TOKEN:-${TELEGRAM_NEWS_BOT_TOKEN:-$TELEGRAM_BOT_TOKEN}}" ]; then
            echo "::error::Configure ALFREDO_NEWS_BOT_TOKEN em Settings > Secrets and variables > Actions."
            exit 1
          fi

          if [ -z "${ALFREDO_NEWS_BOT_CHAT_ID:-${TELEGRAM_NEWS_CHAT_ID:-$TELEGRAM_CHAT_ID}}" ]; then
            echo "::error::Configure ALFREDO_NEWS_BOT_CHAT_ID em Settings > Secrets and variables > Actions."
            exit 1
          fi
        env:
          ALFREDO_NEWS_BOT_TOKEN: ${{ secrets.ALFREDO_NEWS_BOT_TOKEN }}
          ALFREDO_NEWS_BOT_CHAT_ID: ${{ secrets.ALFREDO_NEWS_BOT_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_NEWS_BOT_TOKEN: ${{ secrets.TELEGRAM_NEWS_BOT_TOKEN }}
          TELEGRAM_NEWS_CHAT_ID: ${{ secrets.TELEGRAM_NEWS_CHAT_ID }}

      - name: Executar Alfredo Jornalista
        run: npm run alfredo:jornalista
        env:
          ALFREDO_NEWS_BOT_TOKEN: ${{ secrets.ALFREDO_NEWS_BOT_TOKEN }}
          ALFREDO_NEWS_BOT_CHAT_ID: ${{ secrets.ALFREDO_NEWS_BOT_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_NEWS_BOT_TOKEN: ${{ secrets.TELEGRAM_NEWS_BOT_TOKEN }}
          TELEGRAM_NEWS_CHAT_ID: ${{ secrets.TELEGRAM_NEWS_CHAT_ID }}
          RSS_FEED_URL: ${{ vars.RSS_FEED_URL }}
          NEWS_MAX_ITEMS: ${{ vars.NEWS_MAX_ITEMS }}

      - name: Versionar historico
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/state/news-history.json .github/state/daily-log.json

          if git diff --cached --quiet; then
            echo "Historico sem alteracoes."
            exit 0
          fi

          git commit -m "Atualiza historico do Alfredo Jornalista"
          git pull --rebase origin "$GITHUB_REF_NAME"
          git push origin HEAD:"$GITHUB_REF_NAME"
