name: Alfredo Secretario

on:
  schedule:
    # 02:59 UTC equivale a 23:59 em America/Sao_Paulo.
    - cron: '59 2 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: alfredo-secretario
  cancel-in-progress: true

jobs:
  gerar-relatorio-diario:
    name: Gerar e enviar relatorio diario
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Instalar dependencias
        run: npm ci --omit=dev

      - name: Validar configuracao
        run: |
          if [ -z "${ALFREDO_SECRETARIO_BOT_TOKEN:-$TELEGRAM_BOT_TOKEN}" ]; then
            echo "::error::Configure ALFREDO_SECRETARIO_BOT_TOKEN em Settings > Secrets and variables > Actions."
            exit 1
          fi

          if [ -z "${ALFREDO_SECRETARIO_BOT_CHAT_ID:-$TELEGRAM_CHAT_ID}" ]; then
            echo "::error::Configure ALFREDO_SECRETARIO_BOT_CHAT_ID em Settings > Secrets and variables > Actions."
            exit 1
          fi

          if [ -z "${ALFREDO_SECRETARIO_GEMINI_API_KEY}" ]; then
            echo "::error::Configure ALFREDO_SECRETARIO_GEMINI_API_KEY em Settings > Secrets and variables > Actions."
            exit 1
          fi

          if [ -z "${ALFREDO_SECRETARIO_GMAIL_USER}" ]; then
            echo "::error::Configure ALFREDO_SECRETARIO_GMAIL_USER em Settings > Secrets and variables > Actions."
            exit 1
          fi

          if [ -z "${ALFREDO_SECRETARIO_GMAIL_APP_PASSWORD}" ]; then
            echo "::error::Configure ALFREDO_SECRETARIO_GMAIL_APP_PASSWORD em Settings > Secrets and variables > Actions."
            exit 1
          fi
        env:
          ALFREDO_SECRETARIO_BOT_TOKEN: ${{ secrets.ALFREDO_SECRETARIO_BOT_TOKEN }}
          ALFREDO_SECRETARIO_BOT_CHAT_ID: ${{ secrets.ALFREDO_SECRETARIO_BOT_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ALFREDO_SECRETARIO_GEMINI_API_KEY: ${{ secrets.ALFREDO_SECRETARIO_GEMINI_API_KEY }}
          ALFREDO_SECRETARIO_GMAIL_USER: ${{ secrets.ALFREDO_SECRETARIO_GMAIL_USER }}
          ALFREDO_SECRETARIO_GMAIL_APP_PASSWORD: ${{ secrets.ALFREDO_SECRETARIO_GMAIL_APP_PASSWORD }}

      - name: Executar Alfredo Secretario
        run: npm run alfredo:secretario
        env:
          ALFREDO_SECRETARIO_BOT_TOKEN: ${{ secrets.ALFREDO_SECRETARIO_BOT_TOKEN }}
          ALFREDO_SECRETARIO_BOT_CHAT_ID: ${{ secrets.ALFREDO_SECRETARIO_BOT_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ALFREDO_SECRETARIO_GEMINI_API_KEY: ${{ secrets.ALFREDO_SECRETARIO_GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          ALFREDO_SECRETARIO_GMAIL_USER: ${{ secrets.ALFREDO_SECRETARIO_GMAIL_USER }}
          ALFREDO_SECRETARIO_GMAIL_APP_PASSWORD: ${{ secrets.ALFREDO_SECRETARIO_GMAIL_APP_PASSWORD }}
          ALFREDO_SECRETARIO_EMAIL_TO: ${{ vars.ALFREDO_SECRETARIO_EMAIL_TO }}
          FORCE_SECRETARIO_RESEND: ${{ vars.FORCE_SECRETARIO_RESEND }}

      - name: Versionar historico
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/state/secretario-history.json

          if git diff --cached --quiet; then
            echo "Historico sem alteracoes."
            exit 0
          fi

          git commit -m "Atualiza historico do Alfredo Secretario"
          git pull --rebase origin "$GITHUB_REF_NAME"
          git push origin HEAD:"$GITHUB_REF_NAME"
